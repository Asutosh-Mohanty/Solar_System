<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        .container {
            font-size: 10px;
            width: 80em;
            height: 80em;
            position: relative;
        }
        .sun {
            position: absolute;
            top: 37.5em;
            left: 37.5em;
            width: 5em;
            height: 5em;
            background: radial-gradient(circle, #ffd700, #ff8c00);
            border-radius: 50%;
            box-shadow: 0 0 4em rgba(255, 215, 0, 0.8), 0 0 8em rgba(255, 140, 0, 0.4);
            z-index: 10;
        }
        .orbit {
            position: absolute;
            border: 0.08em solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .planet-container {
            position: absolute;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .planet {
            position: absolute;
            border-radius: 50%;
            box-shadow: inset -0.2em -0.2em 0.5em rgba(0, 0, 0, 0.4);
        }
        
        /* Mercury */
        .mercury-orbit { width: 15em; height: 15em; }
        .mercury-container {
            width: 15em;
            height: 15em;
            animation: orbit 8s linear infinite;
        }
        .mercury {
            top: 0.5em;
            left: 6.9em;
            width: 1.2em;
            height: 1.2em;
            background: radial-gradient(circle at 30% 30%, #b8b8b8, #6b6b6b);
        }
        
        /* Venus */
        .venus-orbit { width: 20em; height: 20em; }
        .venus-container {
            width: 20em;
            height: 20em;
            animation: orbit 15s linear infinite;
        }
        .venus {
            top: 0.3em;
            left: 8.9em;
            width: 2.2em;
            height: 2.2em;
            background: radial-gradient(circle at 30% 30%, #ffd89b, #d4a574);
        }
        
        /* Earth */
        .earth-orbit { width: 28em; height: 28em; }
        .earth-container {
            width: 28em;
            height: 28em;
            animation: orbit 20s linear infinite;
        }
        .earth {
            top: 0.2em;
            left: 12.4em;
            width: 3em;
            height: 3em;
            background: radial-gradient(circle at 30% 30%, #4a9eff, #1e5a8e);
            box-shadow: inset -0.3em -0.3em 0.8em rgba(0, 0, 0, 0.5),
                        0 0 1em rgba(74, 158, 255, 0.4);
        }
        .moon {
            position: absolute;
            top: -0.8em;
            left: 1.2em;
            width: 0.8em;
            height: 0.8em;
            background: radial-gradient(circle at 30% 30%, #e8e8e8, #999);
            border-radius: 50%;
            box-shadow: inset -0.1em -0.1em 0.2em rgba(0, 0, 0, 0.4);
            animation: orbit 3s linear infinite;
            transform-origin: 0.9em 2.3em;
        }
        
        /* Mars */
        .mars-orbit { width: 36em; height: 36em; }
        .mars-container {
            width: 36em;
            height: 36em;
            animation: orbit 30s linear infinite;
        }
        .mars {
            top: 0.6em;
            left: 16.2em;
            width: 2.2em;
            height: 2.2em;
            background: radial-gradient(circle at 30% 30%, #e57373, #c44536);
        }
        
        /* Jupiter */
        .jupiter-orbit { width: 48em; height: 48em; }
        .jupiter-container {
            width: 48em;
            height: 48em;
            animation: orbit 50s linear infinite;
        }
        .jupiter {
            top: -0.5em;
            left: 20.5em;
            width: 6em;
            height: 6em;
            background: 
                repeating-linear-gradient(
                    0deg,
                    #d4a574 0px,
                    #c8956c 2px,
                    #b87d56 4px,
                    #d4a574 6px
                ),
                radial-gradient(circle at 30% 30%, #e8c39e, #b87d56);
            box-shadow: inset -0.6em -0.6em 1.2em rgba(0, 0, 0, 0.4);
        }
        .jupiter-spot {
            position: absolute;
            top: 2.2em;
            left: 1em;
            width: 1.5em;
            height: 1.1em;
            background: radial-gradient(ellipse, #c44536, #8b3626);
            border-radius: 50%;
            opacity: 0.8;
        }
        
        /* Saturn */
        .saturn-orbit { width: 60em; height: 60em; }
        .saturn-container {
            width: 60em;
            height: 60em;
            animation: orbit 70s linear infinite;
        }
        .saturn {
            top: 0.2em;
            left: 26.5em;
            width: 5em;
            height: 5em;
            background: radial-gradient(circle at 30% 30%, #f4d03f, #c39422);
            z-index: 2;
        }
        .saturn-rings {
            position: absolute;
            top: -1.3em;
            left: 24em;
            width: 9em;
            height: 9em;
            border: 0.5em solid rgba(210, 180, 140, 0.6);
            border-radius: 50%;
            transform: rotateX(70deg);
            box-shadow: inset 0 0 0.8em rgba(139, 119, 101, 0.8);
            z-index: 1;
        }
        .saturn-rings::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 7em;
            height: 7em;
            border: 0.35em solid rgba(190, 160, 120, 0.4);
            border-radius: 50%;
        }
        
        /* Uranus */
        .uranus-orbit { width: 70em; height: 70em; }
        .uranus-container {
            width: 70em;
            height: 70em;
            animation: orbit 90s linear infinite;
        }
        .uranus {
            top: 0.8em;
            left: 32.1em;
            width: 4em;
            height: 4em;
            background: radial-gradient(circle at 30% 30%, #7dd3c0, #4db8a8);
        }
        
        /* Neptune */
        .neptune-orbit { width: 78em; height: 78em; }
        .neptune-container {
            width: 78em;
            height: 78em;
            animation: orbit 110s linear infinite;
        }
        .neptune {
            top: 1em;
            left: 36.2em;
            width: 3.8em;
            height: 3.8em;
            background: radial-gradient(circle at 30% 30%, #5b7fc7, #2e5090);
        }
        
        /* Asteroids/Satellites */
        .asteroid {
            position: absolute;
            background: radial-gradient(circle at 35% 35%, #a8967a, #6b5d4f);
            border-radius: 45% 55% 52% 48%;
            box-shadow: inset -0.15em -0.15em 0.25em rgba(0, 0, 0, 0.7),
                        0 0 0.3em rgba(168, 150, 122, 0.3);
            z-index: 5;
        }
        
        .meteor {
            position: absolute;
            width: 0.3em;
            height: 0.3em;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 0.5em white;
            animation: meteor-fall linear infinite;
        }
        .meteor::after {
            content: '';
            position: absolute;
            top: 0;
            right: 100%;
            width: 5em;
            height: 0.15em;
            background: linear-gradient(to right, transparent, rgba(255, 100, 0, 0.8), rgba(255, 200, 0, 0.6));
            border-radius: 50%;
        }
        @keyframes meteor-fall {
            0% {
                transform: translate(0, 0) rotate(-45deg);
                opacity: 1;
            }
            100% {
                transform: translate(-50em, 50em) rotate(-45deg);
                opacity: 0;
            }
        }
        @keyframes orbit {
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }
        .controls {
            position: fixed;
            bottom: 2em;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 30, 0.9);
            padding: 1.5em 2.5em;
            border-radius: 1em;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0.5em 2em rgba(0, 0, 0, 0.5);
            z-index: 100;
        }
        .speed-label {
            color: #fff;
            font-size: 0.9em;
            margin-bottom: 0.8em;
            text-align: center;
            letter-spacing: 0.05em;
            opacity: 0.9;
        }
        .speed-label span {
            color: #4a9eff;
            font-weight: 600;
        }
        .speed-slider {
            width: 15em;
            height: 0.4em;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 0.2em;
            outline: none;
            -webkit-appearance: none;
            cursor: pointer;
        }
        .speed-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 1.2em;
            height: 1.2em;
            background: linear-gradient(135deg, #4a9eff 0%, #1e5a8e 100%);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 0.8em rgba(74, 158, 255, 0.6);
            transition: transform 0.2s;
        }
        .speed-slider::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }
        .speed-slider::-moz-range-thumb {
            width: 1.2em;
            height: 1.2em;
            background: linear-gradient(135deg, #4a9eff 0%, #1e5a8e 100%);
            border-radius: 50%;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 0.8em rgba(74, 158, 255, 0.6);
        }
        .speed-value {
            color: #4a9eff;
            font-size: 0.85em;
            text-align: center;
            margin-top: 0.5em;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    
    <div class="container">
        <div class="sun"></div>
        
        <!-- Orbits -->
        <div class="orbit mercury-orbit"></div>
        <div class="orbit venus-orbit"></div>
        <div class="orbit earth-orbit"></div>
        <div class="orbit mars-orbit"></div>
        <div class="orbit jupiter-orbit"></div>
        <div class="orbit saturn-orbit"></div>
        <div class="orbit uranus-orbit"></div>
        <div class="orbit neptune-orbit"></div>
        
        <!-- Mercury -->
        <div class="planet-container mercury-container">
            <div class="planet mercury"></div>
        </div>
        
        <!-- Venus -->
        <div class="planet-container venus-container">
            <div class="planet venus"></div>
        </div>
        
        <!-- Earth -->
        <div class="planet-container earth-container" id="earthContainer">
            <div class="planet earth">
                <div class="moon"></div>
            </div>
        </div>
        
        <!-- Mars -->
        <div class="planet-container mars-container">
            <div class="planet mars"></div>
        </div>
        
        <!-- Jupiter -->
        <div class="planet-container jupiter-container">
            <div class="planet jupiter">
                <div class="jupiter-spot"></div>
            </div>
        </div>
        
        <!-- Saturn -->
        <div class="planet-container saturn-container">
            <div class="saturn-rings"></div>
            <div class="planet saturn"></div>
        </div>
        
        <!-- Uranus -->
        <div class="planet-container uranus-container">
            <div class="planet uranus"></div>
        </div>
        
        <!-- Neptune -->
        <div class="planet-container neptune-container">
            <div class="planet neptune"></div>
        </div>
    </div>

    <div class="controls">
        <div class="speed-label"><span>Earth</span> Orbital Speed</div>
        <input type="range" min="0.1" max="5" step="0.1" value="1" class="speed-slider" id="speedSlider">
        <div class="speed-value"><span id="speedValue">1.0</span>x</div>
    </div>

    <script>
        // Generate stars
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 250; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = Math.random() * 2 + 'px';
            star.style.height = star.style.width;
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            starsContainer.appendChild(star);
        }

        // Generate asteroids/satellites - BIGGER and more visible
        const container = document.querySelector('.container');
        const asteroidPositions = [
            { orbit: 10, angle: 45, size: 1.2 },
            { orbit: 12, angle: 120, size: 0.9 },
            { orbit: 18, angle: 200, size: 1.4 },
            { orbit: 22, angle: 310, size: 0.8 },
            { orbit: 25, angle: 80, size: 1.1 },
            { orbit: 32, angle: 300, size: 1.3 },
            { orbit: 38, angle: 170, size: 0.9 },
            { orbit: 42, angle: 150, size: 1.5 },
            { orbit: 44, angle: 260, size: 1.2 },
            { orbit: 52, angle: 60, size: 1.0 },
            { orbit: 54, angle: 30, size: 1.4 },
            { orbit: 56, angle: 180, size: 1.1 },
            { orbit: 64, angle: 240, size: 1.3 },
            { orbit: 65, angle: 90, size: 1.6 },
            { orbit: 68, angle: 210, size: 1.2 },
            { orbit: 72, angle: 135, size: 1.0 },
            { orbit: 74, angle: 330, size: 1.5 },
            { orbit: 76, angle: 15, size: 1.1 },
        ];

        asteroidPositions.forEach(pos => {
            const asteroid = document.createElement('div');
            asteroid.className = 'asteroid';
            asteroid.style.width = pos.size + 'em';
            asteroid.style.height = pos.size + 'em';
            
            const radian = (pos.angle * Math.PI) / 180;
            const x = 40 + pos.orbit * Math.cos(radian);
            const y = 40 + pos.orbit * Math.sin(radian);
            
            asteroid.style.left = x + 'em';
            asteroid.style.top = y + 'em';
            asteroid.style.transform = `rotate(${Math.random() * 360}deg)`;
            
            container.appendChild(asteroid);
        });

        // Generate meteors
        function createMeteor() {
            const meteor = document.createElement('div');
            meteor.className = 'meteor';
            meteor.style.left = Math.random() * 100 + '%';
            meteor.style.top = Math.random() * 50 + '%';
            meteor.style.animationDuration = (Math.random() * 2 + 1) + 's';
            document.body.appendChild(meteor);
            
            setTimeout(() => meteor.remove(), 3000);
        }
        
        setInterval(createMeteor, 2500);

        // Earth speed control only
        const earthContainer = document.getElementById('earthContainer');
        const speedSlider = document.getElementById('speedSlider');
        const speedValue = document.getElementById('speedValue');

        speedSlider.addEventListener('input', (e) => {
            const speed = parseFloat(e.target.value);
            speedValue.textContent = speed.toFixed(1);
            
            earthContainer.style.animationDuration = (20 / speed) + 's';
        });
    </script>
</body>
</html>
